<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>速度王 SpeedStar</title>
  <meta name="theme-color" content="#0d1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="速度王" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡️</text></svg>" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-mode="run">

  <header class="topbar">
    <div class="brand"><span class="bolt">⚡️</span> <span id="appName">速度王</span></div>
    <button id="recordsBtn" class="ghost" aria-label="紀錄"><span class="ti">🏅</span></button>
  </header>

  <main class="stage">
    <!-- 共用鏡頭畫面 -->
    <div class="viewport" id="viewport">
      <video id="cam" playsinline muted autoplay></video>
      <canvas id="overlay"></canvas>

      <div class="hud-top">
        <span id="status" class="pill">準備中…</span>
        <span id="liveSpeed" class="pill speed">-- <small>km/h</small></span>
      </div>

      <div class="hud-center" id="countdown" hidden></div>

      <!-- 手動點按計時的觸控層 -->
      <button class="tap-catcher" id="tapCatcher" hidden><span id="tapText">點一下</span></button>

      <!-- 沒有鏡頭時的遮罩 -->
      <div class="cam-cover" id="camCover">
        <div class="cam-cover-inner">
          <div class="big-emoji" id="coverEmoji">📷</div>
          <p id="coverText">點下面的「開始」開啟鏡頭，把手機架在側面拍攝跑道。</p>
          <button id="startCam" class="primary">開啟鏡頭</button>
        </div>
      </div>
    </div>

    <!-- 模式控制面板 -->
    <section class="panel" id="panel"></section>

    <!-- 結果 / 慶祝 -->
    <section class="result" id="result" hidden></section>
  </main>

  <!-- 紀錄抽屜 -->
  <div class="sheet" id="recordsSheet" hidden>
    <div class="sheet-card">
      <div class="sheet-head">
        <h2>最佳紀錄 🏅</h2>
        <button id="closeRecords" class="ghost">✕</button>
      </div>
      <div id="recordsBody"></div>
      <button id="clearRecords" class="danger-ghost">清除全部紀錄</button>
    </div>
  </div>

  <nav class="tabbar">
    <button class="tab" data-mode="run"><span class="ic">🏃</span><span>跑步</span></button>
    <button class="tab" data-mode="race"><span class="ic">🚩</span><span>比賽</span></button>
    <button class="tab" data-mode="kick"><span class="ic">⚽️</span><span>踢球</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js" defer></script>
  <script src="vision.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
